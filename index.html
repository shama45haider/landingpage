<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SparksByAura | Electrical Services NYC</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Montserrat',sans-serif;
  background:radial-gradient(circle at top,#0a0f2c 0%,#050816 40%,#000 100%);
  color:#fff;
  overflow-x:hidden;
  position:relative;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 30%,rgba(59,130,246,0.18),transparent 40%),
    radial-gradient(circle at 80% 70%,rgba(37,99,235,0.15),transparent 45%),
    radial-gradient(circle at 50% 90%,rgba(96,165,250,0.12),transparent 40%);
  animation:backgroundMove 18s ease-in-out infinite alternate;
  z-index:0;
  pointer-events:none;
}

@keyframes backgroundMove{
  0%{transform:translateY(0) scale(1)}
  50%{transform:translateY(-20px) scale(1.05)}
  100%{transform:translateY(10px) scale(1)}
}

section{padding:90px 20px;position:relative;z-index:1}
.container{max-width:1200px;margin:auto}

/* ================= NAVIGATION ================= */

nav{
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  border-bottom:1px solid #1e3a8a;
  position:sticky;
  top:0;
  z-index:1000;
}

nav img{
  height:55px;
  position:absolute;
  left:20px;
}

.nav-links{
  display:flex;
  gap:30px;
}

.nav-links a{
  text-decoration:none;
  color:#cbd5e1;
  font-weight:600;
  transition:.3s;
  position:relative;
}

/* Highlight Client Portal */
.nav-links a.portal-link{
  color:#60a5fa;
  font-weight:700;
  text-shadow:0 0 10px rgba(59,130,246,.6);
}

.nav-links a.portal-link:hover{
  color:#93c5fd;
  text-shadow:0 0 18px rgba(59,130,246,1);
}

.nav-links a:hover{
  color:#60a5fa;
}

.nav-links a::after{
  content:'';
  position:absolute;
  left:0;
  bottom:-6px;
  width:0%;
  height:2px;
  background:#3b82f6;
  transition:.3s;
}

.nav-links a:hover::after{
  width:100%;
}

/* Mobile Menu */
.menu-toggle{
  display:none;
  position:absolute;
  right:20px;
  font-size:28px;
  cursor:pointer;
  color:#60a5fa;
}

@media(max-width:900px){
  .nav-links{
    position:fixed;
    top:0;
    right:-100%;
    height:100vh;
    width:260px;
    background:#0a0f2c;
    flex-direction:column;
    padding-top:100px;
    gap:25px;
    transition:.4s ease;
    box-shadow:-5px 0 25px rgba(0,0,0,.5);
  }

  .nav-links.active{
    right:0;
  }

  .menu-toggle{
    display:block;
  }

  nav img{
    position:static;
    margin-right:auto;
  }
}

/* ================= HERO ================= */

.hero{text-align:center;padding:140px 20px 100px;position:relative}

.hero::after{
  content:'';
  position:absolute;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  width:120px;
  height:3px;
  background:linear-gradient(90deg,#60a5fa,#3b82f6,#1d4ed8);
  box-shadow:0 0 20px rgba(59,130,246,.8);
}

.hero h1{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(42px,6vw,72px);
  font-weight:900;
  letter-spacing:1px;
}

.hero p{
  max-width:750px;
  margin:25px auto;
  color:#cbd5e1;
  font-size:19px;
}

/* Remaining CSS continues exactly as in your canvas... */
</style>
</head>
<body>

<nav>
  <img src="spalogomain.png" alt="SparksByAura Logo">
  <div class="nav-links" id="navLinks">
    <a href="#about">About</a>
    <a href="#gallery">Gallery</a>
    <a href="#partners">Partners</a>
    <a href="portal.html" class="portal-link">Client Portal</a>
    <a href="admin.html">🔒 Admin</a>
  </div>
  <div class="menu-toggle" onclick="toggleMenu()">☰</div>
</nav>

<!-- All sections below remain identical to your canvas version -->

<script>
function toggleMenu(){
  document.getElementById('navLinks').classList.toggle('active');
}
</script>

</body>
</html>
