<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SparksByAura | Client Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Montserrat',sans-serif;
  background:radial-gradient(circle at top,#0a0f2c 0%,#050816 50%,#000 100%);
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  position:relative;
  overflow:hidden;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 30%,rgba(59,130,246,0.18),transparent 40%),
    radial-gradient(circle at 80% 70%,rgba(37,99,235,0.15),transparent 45%);
  animation:backgroundMove 18s ease-in-out infinite alternate;
  z-index:0;
}

@keyframes backgroundMove{
  0%{transform:translateY(0) scale(1)}
  50%{transform:translateY(-20px) scale(1.05)}
  100%{transform:translateY(10px) scale(1)}
}

.portal-container{
  position:relative;
  z-index:1;
  width:100%;
  max-width:450px;
  background:linear-gradient(145deg,#0f1b4d,#111c4d);
  padding:50px;
  border-radius:30px;
  border:1px solid #1e3a8a;
  box-shadow:0 0 50px rgba(37,99,235,.25);
  backdrop-filter:blur(10px);
}

h1{
  font-family:'Orbitron',sans-serif;
  text-align:center;
  margin-bottom:30px;
  font-size:30px;
  background:linear-gradient(90deg,#60a5fa,#3b82f6,#1d4ed8);
  -webkit-background-clip:text;
  color:transparent;
}

.tabs{
  display:flex;
  margin-bottom:25px;
}

.tabs button{
  flex:1;
  padding:12px;
  border:none;
  cursor:pointer;
  font-weight:600;
  background:#0a0f2c;
  color:#cbd5e1;
  transition:.3s;
}

.tabs button.active{
  background:#2563eb;
  color:#fff;
}

form{
  display:none;
  flex-direction:column;
}

form.active{
  display:flex;
}

input{
  padding:14px;
  margin-bottom:15px;
  border-radius:12px;
  border:1px solid #1e3a8a;
  background:#0a0f2c;
  color:#fff;
  transition:.3s;
}

input:focus{
  outline:none;
  border-color:#3b82f6;
  box-shadow:0 0 12px rgba(59,130,246,.5);
}

button.submit{
  padding:14px;
  border-radius:50px;
  border:none;
  background:linear-gradient(90deg,#2563eb,#3b82f6);
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  transition:.3s;
}

button.submit:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px rgba(59,130,246,.6);
}

.message{
  text-align:center;
  margin-bottom:15px;
  font-size:14px;
  min-height:18px;
}

.dashboard{
  display:none;
  text-align:center;
}

.logout-btn{
  margin-top:20px;
  background:#dc2626;
}

.back-link{
  text-align:center;
  margin-top:25px;
}

.back-link a{
  color:#60a5fa;
  text-decoration:none;
}

.back-link a:hover{
  text-decoration:underline;
}
</style>
</head>
<body>

<div class="portal-container">
  <h1>Client Portal</h1>

  <div id="authSection">
    <div class="tabs">
      <button id="loginTab" class="active" onclick="showForm('login')">Login</button>
      <button id="registerTab" onclick="showForm('register')">Create Account</button>
    </div>

    <div class="message" id="message"></div>

    <form id="loginForm" class="active">
      <input type="email" id="loginEmail" placeholder="Email Address" required>
      <input type="password" id="loginPassword" placeholder="Password" required>
      <button type="submit" class="submit">Login</button>
    </form>

    <form id="registerForm">
      <input type="text" id="registerName" placeholder="Full Name" required>
      <input type="email" id="registerEmail" placeholder="Email Address" required>
      <input type="password" id="registerPassword" placeholder="Create Password (min 6 chars)" required minlength="6">
      <button type="submit" class="submit">Create Account</button>
    </form>
  </div>

  <div class="dashboard" id="dashboard">
    <h2 id="welcomeText"></h2>
    <p>You are securely logged in.</p>
    <button class="submit logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="back-link">
    <a href="index.html">← Back to Main Site</a>
  </div>
</div>

<script>
function showForm(type){
  document.getElementById('loginForm').classList.remove('active');
  document.getElementById('registerForm').classList.remove('active');
  document.getElementById('loginTab').classList.remove('active');
  document.getElementById('registerTab').classList.remove('active');
  document.getElementById('message').textContent='';

  if(type === 'login'){
    document.getElementById('loginForm').classList.add('active');
    document.getElementById('loginTab').classList.add('active');
  } else {
    document.getElementById('registerForm').classList.add('active');
    document.getElementById('registerTab').classList.add('active');
  }
}

function saveUser(user){
  localStorage.setItem('spaUser', JSON.stringify(user));
}

function getUser(){
  return JSON.parse(localStorage.getItem('spaUser'));
}

function showDashboard(user){
  document.getElementById('authSection').style.display='none';
  document.getElementById('dashboard').style.display='block';
  document.getElementById('welcomeText').textContent = `Welcome, ${user.name}`;
}

function logout(){
  localStorage.removeItem('spaUser');
  location.reload();
}

document.getElementById('registerForm').addEventListener('submit', function(e){
  e.preventDefault();
  const user = {
    name: document.getElementById('registerName').value,
    email: document.getElementById('registerEmail').value,
    password: document.getElementById('registerPassword').value
  };
  saveUser(user);
  showDashboard(user);
});

document.getElementById('loginForm').addEventListener('submit', function(e){
  e.preventDefault();
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  const storedUser = getUser();

  if(storedUser && storedUser.email === email && storedUser.password === password){
    showDashboard(storedUser);
  } else {
    document.getElementById('message').textContent = 'Invalid email or password.';
  }
});

window.onload = function(){
  const user = getUser();
  if(user){
    showDashboard(user);
  }
}
</script>

</body>
</html>
